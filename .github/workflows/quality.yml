name: PipeERP Quality Checks

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: ${{ runner.temp }}/pipeerp-quality-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall -q app tests

      - name: Run regression tests
        run: pytest -q

      - name: Run lint checks
        run: >-
          ruff check app tests
          --exclude
          app/repositories/accounting_repository.py,app/repositories/admin_repository.py,app/repositories/crm_repository.py,app/repositories/detailed_return_refund_repository.py,app/repositories/enhanced_manufacturing_repository.py,app/repositories/manufacturing_repository.py,app/repositories/print_settings_repository.py,app/repositories/return_aware_treasury_repository.py,app/repositories/return_invoice_repository.py,app/repositories/return_refund_repository.py,app/repositories/treasury_repository.py,app/repositories/treasury_invoice_repository.py,app/services/invoice_service.py
