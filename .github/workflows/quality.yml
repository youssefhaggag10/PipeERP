name: PipeERP Quality Checks

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: "."
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: .pipeerp-quality-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-ci.txt

      - name: Compile Python files
        run: python -m compileall -q app tests

      - name: Run regression tests
        run: pytest -q

      - name: Run lint checks
        run: ruff check app tests
