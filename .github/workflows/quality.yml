name: PipeERP Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: ${{ runner.temp }}/pipeerp-test-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall -q app tests

      - name: Run regression tests
        run: pytest -q

      - name: Run focused lint checks
        run: >-
          ruff check
          app/core/config.py
          app/core/app_paths.py
          app/core/logging_setup.py
          app/main.py
          app/repositories/quotation_repository.py
          app/services/a4_document_renderer.py
          app/services/a4_print_service.py
          app/ui/main_window.py
          app/ui/quotation_dialog.py
          app/ui/treasury_order_pages.py
          tests/test_recent_regressions.py
          tests/test_first_run_setup.py
          tests/test_quotations.py
