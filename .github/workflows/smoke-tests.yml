name: PipeERP Smoke Tests

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      PIPEERP_GUI_SMOKE: "1"
      PIPEERP_DATA_DIR: .pipeerp-smoke-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run offscreen GUI and business smoke tests
        run: >-
          pytest -q
          tests/test_application_smoke.py
          tests/test_schema_v9_runs_and_weight_sales.py
          tests/test_migrations.py
          tests/test_manufacturing.py
          tests/test_accounting_invoices.py
