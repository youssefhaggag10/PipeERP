name: PipeERP Smoke Tests

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: "."
      QT_QPA_PLATFORM: offscreen
      PIPEERP_GUI_SMOKE: "1"
      PIPEERP_DATA_DIR: .pipeerp-smoke-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-ci.txt

      - name: Run offscreen GUI and business smoke tests
        shell: bash
        run: |
          set -o pipefail
          pytest -vv --tb=long \
            tests/test_application_smoke.py \
            tests/test_sales_navigation_delegate.py \
            tests/test_manufacturing_completion_summary.py \
            tests/test_schema_v9_runs_and_weight_sales.py \
            tests/test_migrations.py \
            tests/test_manufacturing.py \
            tests/test_accounting_invoices.py 2>&1 | tee smoke-test.log

      - name: Upload smoke-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeerp-smoke-test-log
          path: smoke-test.log
          if-no-files-found: error
          retention-days: 2
