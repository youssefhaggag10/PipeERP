name: Feature Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/theme-crm-manufacturing-weight

permissions:
  contents: write

jobs:
  repair:
    if: github.event_name == 'push' && github.event.head_commit.message != 'Fix feature branch lint failures and remove patch artifacts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/theme-crm-manufacturing-weight
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Apply reviewed live fixes
        shell: bash
        run: |
          base64 -d .github/feature-fix.patch.gz.b64 | gzip -d > /tmp/feature-fix.patch
          patch -p1 < /tmp/feature-fix.patch
          rm -f README_APPLY.md MANUFACTURING_WEIGHT_TEST_CASES.md
          rm -f .github/feature-fix.patch.gz.b64
          rm -f .github/workflows/fix-feature-lint.yml
          cat > .github/workflows/feature-validation.yml <<'YAML'
          name: Feature Validation

          on:
            pull_request:
              branches:
                - main
            push:
              branches:
                - feature/theme-crm-manufacturing-weight

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 30
              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4
                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.11"
                    cache: pip
                - name: Install dependencies
                  run: |
                    python -m pip install --upgrade pip
                    python -m pip install -e ".[dev]"
                - name: Compile application
                  run: python -m compileall -q app tests
                - name: Run tests
                  run: pytest -q
                - name: Run lint
                  run: ruff check app tests
          YAML
          sed -i 's/^          //' .github/workflows/feature-validation.yml
          python -m compileall -q app tests
          pytest -q
          ruff check app tests
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix feature branch lint failures and remove patch artifacts'
          git push origin HEAD:feature/theme-crm-manufacturing-weight

  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q app tests
      - run: pytest -q
      - run: ruff check app tests
