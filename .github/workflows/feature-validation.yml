name: Feature Validation

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: "."
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: .pipeerp-validation-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-ci.txt

      - name: Compile application
        run: python -m compileall -q app tests

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee feature-test.log

      - name: Upload feature test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeerp-feature-test-log
          path: feature-test.log
          if-no-files-found: error
          retention-days: 2

      - name: Run lint
        shell: bash
        run: |
          set -o pipefail
          ruff check app tests 2>&1 | tee feature-lint.log

      - name: Upload feature lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeerp-feature-lint-log
          path: feature-lint.log
          if-no-files-found: error
          retention-days: 2
