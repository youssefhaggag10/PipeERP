name: Feature Validation

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: .pipeerp-validation-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile application
        run: python -m compileall -q app tests

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check app tests

      - name: Compare security findings with main
        if: always() && github.event_name == 'pull_request'
        run: |
          python -m pip install bandit
          bandit -r app -f json -o bandit-current.json || true
          mkdir -p "$RUNNER_TEMP/main-src"
          git archive origin/main app | tar -x -C "$RUNNER_TEMP/main-src"
          bandit -r "$RUNNER_TEMP/main-src/app" -f json -o bandit-main.json || true
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          def load(path: str):
              return json.loads(Path(path).read_text(encoding="utf-8")).get("results", [])

          def relative(filename: str) -> str:
              normalized = filename.replace("\\", "/")
              marker = "/app/"
              if marker in normalized:
                  return "app/" + normalized.split(marker, 1)[1]
              if normalized.startswith("app/"):
                  return normalized
              return normalized

          def key(item: dict):
              return (
                  item.get("test_id", ""),
                  relative(str(item.get("filename", ""))),
                  item.get("issue_text", ""),
                  item.get("issue_severity", ""),
                  item.get("issue_confidence", ""),
              )

          current = load("bandit-current.json")
          baseline = load("bandit-main.json")
          current_counts = Counter(key(item) for item in current)
          baseline_counts = Counter(key(item) for item in baseline)
          remaining = baseline_counts.copy()
          new_items = []
          for item in current:
              item_key = key(item)
              if remaining[item_key] > 0:
                  remaining[item_key] -= 1
              else:
                  new_items.append({
                      "test_id": item.get("test_id"),
                      "filename": relative(str(item.get("filename", ""))),
                      "line_number": item.get("line_number"),
                      "severity": item.get("issue_severity"),
                      "confidence": item.get("issue_confidence"),
                      "text": item.get("issue_text"),
                      "code": item.get("code"),
                  })

          report = {
              "current_total": len(current),
              "main_total": len(baseline),
              "new_total": len(new_items),
              "new_findings": new_items,
          }
          Path("security-diff.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload security comparison
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: security-diff-from-main
          path: security-diff.json
          if-no-files-found: error
          retention-days: 1
