name: Feature Validation

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    permissions:
      checks: read
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      PIPEERP_DATA_DIR: .pipeerp-validation-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile application
        run: python -m compileall -q app tests

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check app tests

      - name: Capture SonarQube check annotations
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          from pathlib import Path

          owner = "youssefhaggag10"
          repo = "PipeERP"
          sha = os.environ["PR_HEAD_SHA"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "PipeERP-CI",
          }

          def get_json(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          selected = []
          all_runs = []
          for _ in range(30):
              payload = get_json(
                  f"https://api.github.com/repos/{owner}/{repo}/commits/{sha}/check-runs?per_page=100"
              )
              all_runs = payload.get("check_runs", [])
              selected = [
                  run
                  for run in all_runs
                  if "sonar" in str(run.get("name", "")).lower()
                  or "sonar" in str((run.get("app") or {}).get("slug", "")).lower()
                  or "quality gate" in str(run.get("name", "")).lower()
              ]
              if selected and all(run.get("status") == "completed" for run in selected):
                  break
              time.sleep(10)

          report = {"head_sha": sha, "sonar_checks": [], "all_check_names": []}
          report["all_check_names"] = [
              {
                  "id": run.get("id"),
                  "name": run.get("name"),
                  "status": run.get("status"),
                  "conclusion": run.get("conclusion"),
                  "app": (run.get("app") or {}).get("slug"),
              }
              for run in all_runs
          ]
          for run in selected:
              annotations = get_json(
                  f"https://api.github.com/repos/{owner}/{repo}/check-runs/{run['id']}/annotations?per_page=100"
              )
              report["sonar_checks"].append(
                  {
                      "id": run.get("id"),
                      "name": run.get("name"),
                      "status": run.get("status"),
                      "conclusion": run.get("conclusion"),
                      "details_url": run.get("details_url"),
                      "output": run.get("output"),
                      "annotations": annotations,
                  }
              )
          Path("sonar-check-diagnostics.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          PY

      - name: Upload SonarQube check diagnostics
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sonar-check-diagnostics
          path: sonar-check-diagnostics.json
          if-no-files-found: error
          retention-days: 1
