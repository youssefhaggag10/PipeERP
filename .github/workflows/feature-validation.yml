name: Feature Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/theme-crm-manufacturing-weight

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: feature-source-snapshot
          path: |
            app
            tests
            pyproject.toml
          if-no-files-found: error
          retention-days: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile application
        run: python -m compileall -q app tests

      - name: Run tests
        run: pytest -q

      - name: Collect lint report
        id: lint
        shell: bash
        run: |
          set +e
          ruff check app tests 2>&1 | tee ruff-report.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-lint-report
          path: ruff-report.txt
          if-no-files-found: error

      - name: Enforce lint result
        if: steps.lint.outputs.status != '0'
        run: exit 1
