name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: pip

      - name: Read application version
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          "PIPEERP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install project, tests, and compiler
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,build]"

      - name: Run quality gate
        shell: pwsh
        run: |
          python -m compileall -q app tests
          pytest -q
          ruff check app/core app/services/first_run_service.py app/ui/first_run_dialog.py tests/test_first_run_setup.py

      - name: Compile standalone Windows application
        shell: pwsh
        run: |
          python -m nuitka `
            --mode=standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --output-dir=build/windows `
            --output-filename=PipeERP.exe `
            --company-name="3A PIPE" `
            --product-name="PipeERP" `
            --file-description="3A PIPE ERP" `
            --file-version="$env:PIPEERP_VERSION.0" `
            --product-version="$env:PIPEERP_VERSION.0" `
            main.py

      - name: Run compiled executable smoke test
        shell: pwsh
        run: |
          $env:PIPEERP_SMOKE_TEST = "1"
          $env:PIPEERP_DATA_DIR = Join-Path $env:RUNNER_TEMP "pipeerp-smoke-data"
          & "build/windows/main.dist/PipeERP.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "Compiled PipeERP executable smoke test failed with exit code $LASTEXITCODE"
          }

      - name: Reject Python source files in client build
        shell: pwsh
        run: |
          $sourceFiles = Get-ChildItem "build/windows/main.dist" -Recurse -File -Filter "*.py"
          if ($sourceFiles) {
            $sourceFiles | ForEach-Object { Write-Host $_.FullName }
            throw "Client build contains Python source files"
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:PIPEERP_VERSION" `
            "installer\PipeERP.iss"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PipeERP-Windows-Installer-${{ env.PIPEERP_VERSION }}
          path: dist/installer/PipeERP-Setup-*.exe
          if-no-files-found: error
          retention-days: 30
