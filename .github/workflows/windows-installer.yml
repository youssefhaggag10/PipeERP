name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/windows-installer.yml"
      - "installer/**"
      - "pyproject.toml"
      - "main.py"
      - "app/main.py"
      - "app/core/**"
      - "app/database/**"
      - "app/services/first_run_service.py"
      - "app/ui/first_run_dialog.py"
      - "tests/test_first_run_setup.py"

permissions:
  contents: read

jobs:
  build-installer:
