name: PipeERP Main Verification Status

"on":
  workflow_run:
    workflows:
      - Feature Validation
      - PipeERP Quality Checks
      - PipeERP Smoke Tests
      - Windows Build
    types:
      - completed
    branches:
      - main

jobs:
  publish-status:
    permissions:
      actions: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Publish combined main verification status
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          sha = os.environ["TARGET_SHA"]
          token = os.environ["GH_TOKEN"]
          current_url = os.environ["CURRENT_RUN_URL"]
          required = {
              "Feature Validation",
              "PipeERP Quality Checks",
              "PipeERP Smoke Tests",
              "Windows Build",
          }
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "PipeERP-main-verification",
          }

          query = urllib.parse.urlencode({"head_sha": sha, "per_page": 100})
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/actions/runs?{query}",
              headers=headers,
          )
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)

          latest = {}
          for run in payload.get("workflow_runs", []):
              name = run.get("name")
              if name not in required or run.get("head_sha") != sha:
                  continue
              previous = latest.get(name)
              if previous is None or int(run.get("run_number", 0)) > int(
                  previous.get("run_number", 0)
              ):
                  latest[name] = run

          missing_or_pending = [
              name
              for name in sorted(required)
              if name not in latest or latest[name].get("status") != "completed"
          ]
          failed = [
              name
              for name in sorted(required)
              if name in latest
              and latest[name].get("status") == "completed"
              and latest[name].get("conclusion") != "success"
          ]

          if failed:
              state = "failure"
              description = "Failed: " + ", ".join(failed)
              target_url = latest[failed[0]].get("html_url") or current_url
          elif missing_or_pending:
              state = "pending"
              description = "Waiting for: " + ", ".join(missing_or_pending)
              target_url = current_url
          else:
              state = "success"
              description = "All PipeERP main workflows passed"
              target_url = current_url

          status_payload = json.dumps(
              {
                  "state": state,
                  "target_url": target_url,
                  "description": description[:140],
                  "context": "PipeERP Main Verification",
              }
          ).encode("utf-8")
          status_request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/statuses/{sha}",
              data=status_payload,
              headers={**headers, "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(status_request) as response:
              json.load(response)
          PY
